    <script>
    const firebaseConfig = JSON.parse(window.__firebase_config);
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'ipa-727-v1';

    window.FB = {
        auth, db, appId,
        // signInAnonymously(auth) - ignora primul arg, folosim auth din closure
        signInAnonymously: (_auth) => auth.signInAnonymously(),
        // onAuthStateChanged(auth, cb) - al doilea arg e callback-ul
        onAuthStateChanged: (_auth, cb) => {
            // daca e apelat cu un singur arg (cb), functioneaza si asa
            const callback = cb || _auth;
            return auth.onAuthStateChanged(callback);
        },
        // doc(db, 'col', 'doc') sau doc(db, 'col/doc')
        doc: (_db, ...pathParts) => {
            const fullPath = pathParts.join('/');
            return db.doc(fullPath);
        },
        // setDoc(ref, data, {merge: true})
        setDoc: (ref, data, opts) => opts && opts.merge ? ref.set(data, { merge: true }) : ref.set(data),
        // onSnapshot(ref, cb) sau onSnapshot(ref, opts, cb)
        onSnapshot: (ref, cbOrOpts, cb) => {
            if (typeof cbOrOpts === 'function') return ref.onSnapshot(cbOrOpts, cb);
            return ref.onSnapshot(cbOrOpts, cb);
        },
        // collection(db, 'artifacts', appId, 'public', ...)
        collection: (_db, ...pathParts) => {
            const fullPath = pathParts.join('/');
            return db.collection(fullPath);
        },
        addDoc: (ref, data) => ref.add(data),
        // query(ref, orderBy(...)) - constraints sunt functii
        query: (ref, ...constraints) => {
            let q = ref;
            for (const c of constraints) {
                if (typeof c === 'function') q = c(q);
            }
            return q;
        },
        // orderBy('field', 'desc') returneaza o functie care aplica .orderBy pe ref
        orderBy: (field, dir) => (ref) => ref.orderBy(field, dir || 'asc'),
        deleteDoc: (ref) => ref.delete(),
        updateDoc: (ref, data) => ref.update(data),
    };

    console.log("Firebase initializat cu succes!");
    </script>

        const getWeekNumber = (d) => {
            const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);

                const day = parseInt(parts[0], 10);
                let month = 0;

                for (let [monthName, monthNum] of Object.entries(months)) {
                    if (parts[1].includes(monthName)) {
                        month = monthNum;
                        break;
                    }
                }

                if (day && month) {
                    return (2026 * 10000) + (month * 100) + day;
                }
            }
            return Infinity;
        };

                                </label>
                                <input 
                                    type="file" 
                                    multiple
                                    accept="application/pdf,image/*"
                                    onChange={async (e) => {
                                        const files = Array.from(e.target.files);
                                        if (!files.length) return;

                                        const processedFiles = [];

                                        for (let file of files) {
                                            if (file.type === 'application/pdf') {
                                                if (file.size > 25 * 1024 * 1024) {
                                                    alert(`Atenție: PDF-ul ${file.name} are peste 25MB. Acesta nu va fi comprimat.`);
                                                }
                                                const reader = new FileReader();
                                                const base64 = await new Promise(resolve => {
                                                    reader.onloadend = () => resolve(reader.result);
                                                    reader.readAsDataURL(file);
                                                });
                                                processedFiles.push({ name: file.name, data: base64 });
                                            } else if (file.type.startsWith('image/')) {
                                                const reader = new FileReader();
                                                const base64 = await new Promise(resolve => {
                                                    reader.onload = (event) => {
                                                        const img = new Image();
                                                        img.onload = () => {
                                                            const canvas = document.createElement('canvas');
                                                            let width = img.width;
                                                            let height = img.height;

                                                            const MAX_WIDTH = 2000;
                                                            const MAX_HEIGHT = 2000;

                                                            if (width > height) {
                                                                if (width > MAX_WIDTH) {
                                                                    height *= MAX_WIDTH / width;
                                                                    width = MAX_WIDTH;
                                                                }
                                                            } else {
                                                                if (height > MAX_HEIGHT) {
                                                                    width *= MAX_HEIGHT / height;
                                                                    height = MAX_HEIGHT;
                                                                }
                                                            }

                                                            canvas.width = width;
                                                            canvas.height = height;
                                                            const ctx = canvas.getContext('2d');
                                                            ctx.drawImage(img, 0, 0, width, height);
                                                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                                                        };
                                                        img.src = event.target.result;
                                                    };
                                                    reader.readAsDataURL(file);
                                                });
                                                processedFiles.push({ name: file.name.split('.')[0] + '.jpg', data: base64 });
                                            }
                                        }

                                        setEditedAnnouncement(prev => ({

                                                <span>✅ {f.name.substring(0, 25)}{f.name.length > 25 ? '...' : ''}</span>

                                                    className="text-red-500 cursor-pointer px-2 text-xs hover:scale-125 transition-all"

                                >
                                    Renunță
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'} p-5 rounded-2xl border shadow-sm transition-all relative group card-hover animate-slide`}>
                    <div className="flex items-start gap-3 mb-3">
                        <span className="text-2xl">{getTypeIcon(announcement.type)}</span>
                        <div className="flex-1 overflow-hidden">
                            <div className="flex items-center justify-between mb-1">

                                <span className={`text-[8px] font-black px-2 py-1 rounded-full flex-shrink-0 ${getTypeColor(announcement.type)}`}>
                                    {announcement.type === 'test' ? 'TEST' : announcement.type === 'tema' ? 'TEMĂ' : announcement.type === 'materiale' ? 'MATERIALE' : 'OBSERVAȚIE'}
                                </span>

                            {announcement.subject && (
                                <p className="text-[10px] font-bold text-green-500 mb-1">📚 {announcement.subject}</p>

                            <p className={`text-sm mb-2 break-words whitespace-pre-wrap ${darkMode ? 'text-red-400' : 'text-red-500'}`}>{announcement.content}</p>
                            
                            {/* AFISARE FISIER VECHI SINGULAR */}
                            {announcement.fileData && (!announcement.attachedFiles || announcement.attachedFiles.length === 0) && (
                                <div className="mb-3">
                                    <a 
                                        href={announcement.fileData} 
                                        download={announcement.fileName || 'material'}
                                        className={`inline-flex items-center gap-2 px-3 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${darkMode ? 'bg-blue-900/30 border-blue-800 text-blue-400 hover:bg-blue-600 hover:text-white' : 'bg-blue-50 border-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white'}`}
                                    >
                                        📥 DESCARCĂ: {announcement.fileName?.substring(0, 15)}...
                                    </a>
                                </div>

                            {/* AFISARE FISIERE MULTIPLE NOI */}
                            {announcement.attachedFiles && announcement.attachedFiles.length > 0 && (
                                <div className="mb-3 flex flex-wrap gap-2">
                                    {announcement.attachedFiles.map((file, idx) => (
                                        <a 
                                            key={idx}
                                            href={file.data} 
                                            download={file.name || 'material'}
                                            className={`inline-flex items-center gap-2 px-3 py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${darkMode ? 'bg-blue-900/30 border-blue-800 text-blue-400 hover:bg-blue-600 hover:text-white' : 'bg-blue-50 border-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white'}`}

                            <div className="flex items-center justify-between font-bold mt-2">

                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-1">

        function App() {
            const [now, setNow] = useState(new Date());
            const [view, setView] = useState('orar'); 
            const [exams, setExams] = useState(defaultExams);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isPinModalOpen, setIsPinModalOpen] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [editModalExam, setEditModalExam] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [user, setUser] = useState(null);
            const [isOnline, setIsOnline] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [announcements, setAnnouncements] = useState([]);
            const [showNewAnnouncementModal, setShowNewAnnouncementModal] = useState(false);
            const [accentColor, setAccentColor] = useState(() => localStorage.getItem('ipa_accent') || 'blue');
            
            // STATE NICKNAME
            const [nickname, setNickname] = useState(() => localStorage.getItem('ipa_nickname') || '');
            const [showNicknamePrompt, setShowNicknamePrompt] = useState(false);
            const [tempNickname, setTempNickname] = useState('');

            const [newAnnouncement, setNewAnnouncement] = useState({ 
                title: '', 
                content: '', 
                type: 'tema',
                subject: '',
                dueDate: '',
                attachedFiles: [],
                author: nickname || '' 
            });

            // LOGICA VERIFICARE SNOOZE NICKNAME
            useEffect(() => {
                const storedNickname = localStorage.getItem('ipa_nickname');
                if (!storedNickname) {
                    const snoozeDateStr = localStorage.getItem('ipa_nickname_snooze');
                    if (snoozeDateStr) {
                        const snoozeDate = new Date(snoozeDateStr);
                        const diffTime = Math.abs(new Date() - snoozeDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                        if (diffDays > 10) {
                            setShowNicknamePrompt(true);
                        }
                    } else {
                        setShowNicknamePrompt(true);
                    }
                }
            }, []);

            const currentSemWeek = useMemo(() => {
                const semStart = new Date(2026, 9, 28); // 23 Septembrie
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                if (today < semStart) return 1; 
                
                const diffTime = today.getTime() - semStart.getTime();
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                // Am adăugat un offset de +2 zile. 
                // Acest lucru face ca săptămâna să se "schimbe" sâmbăta în loc de luni.
                // Astfel, pe 11 Aprilie (sâmbătă), sistemul va arăta deja Săptămâna 8.
                return Math.floor((diffDays + 2) / 7) + 1;
            }, [now]);
            
            const currentWeekParity = useMemo(() => {
                const weekNum = getWeekNumber(now);
                return weekNum % 2 === 0 ? 'Impară' : 'Pară';
            }, [now]);

            const semesterProgress = useMemo(() => {
                const start = new Date(2026, 9, 28); 
                const end = new Date(2027, 1, 22);    
                const total = end - start;
                const elapsed = now - start;
                const percentage = Math.round((elapsed / total) * 100);
                return Math.min(Math.max(percentage, 0), 100);
            }, [now]);

            const sortedExams = useMemo(() => {
                return [...exams].sort((a, b) => parseExamDate(a.date) - parseExamDate(b.date));
            }, [exams]);

            const [group, setGroup] = useState(() => localStorage.getItem('ipa_g_vFinal') || 'Toate');
            const [week, setWeek] = useState(() => localStorage.getItem('ipa_w_vFinal') || currentWeekParity);
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('ipa_theme') === 'dark');
            const activeCardRef = useRef(null);

            useEffect(() => {
                setTimeout(() => setIsLoading(false), 1200);
            }, []);

            useEffect(() => {
                let unsubscribeAuth;
                
                const initAuth = async () => {
                    let retries = 0;
                    while (!window.FB && retries < 30) {
                        await new Promise(r => setTimeout(r, 200));
                        retries++;
                    }

                    if (window.FB) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.FB;
                        
                        try {
                            await signInAnonymously(auth);
                        } catch (error) {
                            console.error("❌ Eroare autentificare:", error);
                        }
                        
                        unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                            setUser(user);
                            setIsOnline(!!user);
                        });
                    }
                };
                
                initAuth();
                
                return () => {
                    if (unsubscribeAuth) {
                        unsubscribeAuth();
                    }
                };
            }, []);

            useEffect(() => {
                if (!user || !window.FB) return;

                const { db, appId, collection, onSnapshot, query, orderBy } = window.FB;
                const announcementsRef = collection(db, 'artifacts', appId, 'public', 'data', 'announcements');
                const q = query(announcementsRef, orderBy('date', 'desc'));

                const unsubscribe = onSnapshot(q, 
                    (snapshot) => {
                        const announcementsList = [];
                        snapshot.forEach((doc) => {
                            announcementsList.push({ id: doc.id, ...doc.data() });
                        });
                        setAnnouncements(announcementsList);
                    },
                    (error) => {
                        console.error("❌ Eroare încărcare anunțuri:", error);
                    }
                );

                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!user || !window.FB) return;

                const { db, appId, doc, onSnapshot, setDoc } = window.FB;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exams', 'main');
                
                const unsubscribe = onSnapshot(docRef, 
                    (snapshot) => {
                        if (snapshot.exists()) {
                            const data = snapshot.data();
                            if (data && data.list) {
                                setExams(data.list);
                            }
                        } else {
                            setDoc(docRef, { list: defaultExams }, { merge: true })
                                .catch(console.error);
                        }
                        setIsOnline(true);
                    },
                    (error) => {
                        console.error("❌ Eroare sincronizare Firebase:", error);
                        setIsOnline(false);
                    }
                );
                
                return () => unsubscribe();
            }, [user]);
            
            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 60000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                localStorage.setItem('ipa_g_vFinal', group);
                localStorage.setItem('ipa_w_vFinal', week);
                localStorage.setItem('ipa_theme', darkMode ? 'dark' : 'light');
                localStorage.setItem('ipa_accent', accentColor);
            }, [group, week, darkMode, accentColor]);

            const activeDayString = useMemo(() => {
                const dayIndex = now.getDay();
                return days[dayIndex - 1] || 'Luni';
            }, [now]);

            const [activeDay, setActiveDay] = useState(activeDayString);

            useEffect(() => {
                if (view === 'orar' && activeCardRef.current && !isLoading) {
                    setTimeout(() => {
                        activeCardRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 600);
                }
            }, [activeDay, group, week, view, isLoading]);

            const futureSchedule = useMemo(() => {
                return scheduleData.filter(item => {
                    const gMatch = group === 'Toate' || item.group === 'Toți' || item.group === group;
                    
                    let wMatch = true;
                    if (week !== 'Toate') {
                        if (item.week === 'Toate') wMatch = true;
                        else if (week === 'Impară') wMatch = item.week.includes('Impară') || item.week.includes('8-14') || item.week.includes('11') || item.week.includes('13') || item.week.includes('8-10');
                        else if (week === 'Pară') wMatch = item.week.includes('Pară') || item.week.includes('8-14') || item.week.includes('8') || item.week.includes('10') || item.week.includes('12') || item.week.includes('8-10');
                    }
                    return gMatch && wMatch;
                });
            }, [group, week]);

            const filteredSchedule = useMemo(() => {
                return futureSchedule.filter(item => {
                    let chronMatch = true;
                    if (currentSemWeek < 8) {
                        if (item.week.includes('8-14') || item.week.includes('8,') || item.week.includes('8-10')) {
                            chronMatch = false;
                        }
                    }
                    if (currentSemWeek < 11) {
                        if (item.week.includes('11-2h*') && !item.week.includes('8')) {
                            chronMatch = false;
                        }
                    }
                    return chronMatch;
                });
            }, [futureSchedule, currentSemWeek]);

            const futureScheduleForDay = futureSchedule.filter(item => item.day === activeDay);
            const currentSchedule = filteredSchedule.filter(item => item.day === activeDay);

            const activeHoliday = useMemo(() => {
                const dayMap = { 'Luni': 1, 'Marți': 2, 'Miercuri': 3, 'Joi': 4, 'Vineri': 5 };
                const currentDayIndex = now.getDay() || 7; 
                const activeDayIndex = dayMap[activeDay];
                
                if (!activeDayIndex) return null;

                const diff = activeDayIndex - currentDayIndex;
                const targetDate = new Date(now);
                targetDate.setDate(now.getDate() + diff);
                
                const d = targetDate.getDate();
                const m = targetDate.getMonth() + 1; 
                const y = targetDate.getFullYear();
                
                if (y === 2026) {
                    if (m === 4 && d === 10) return 'Vinerea Mare – zi liberă';
                    if (m === 4 && d === 11) return 'Sâmbăta Mare – zi liberă';
                    if (m === 4 && d === 13) return 'A doua zi de Paște – zi liberă';
                    if (m === 4 && d === 14) return 'A treia zi de Paște – zi liberă';
                    if (m === 5 && d === 1) return 'Ziua Internațională a Muncii – zi liberă';
                }
                return null;
            }, [now, activeDay]);

            const isClassActive = (startStr, endStr, dayStr) => {
                const dayIndex = now.getDay();
                if (dayStr !== days[dayIndex - 1]) return false;
                const [sH, sM] = startStr.split(':').map(Number);
                const [eH, eM] = endStr.split(':').map(Number);
                const startT = sH * 60 + sM;
                const endT = eH * 60 + eM;
                const currentT = now.getHours() * 60 + now.getMinutes();
                return currentT >= startT && currentT < endT;
            };

            const handlePinSubmit = () => {
                if (pinInput === '1922') {
                    setIsAdmin(true);
                    setIsPinModalOpen(false);
                    setPinInput('');
                } else {
                    setPinInput('');
                    const input = document.getElementById('pinInput');
                    input.classList.add('border-red-500');
                    setTimeout(() => input.classList.remove('border-red-500'), 500);
                }
            };

            const formatTimeInput = (val) => {
                const clean = val.replace(/\D/g, '').substring(0, 4);
                if (clean.length > 2) {
                    return `${clean.substring(0, 2)}:${clean.substring(2, 4)}`;
                }
                return clean;
            };

            const handleSaveExam = async (updatedExam) => {
                if (!user || !window.FB) return;
                
                setIsSaving(true);
                try {
                    const { db, appId, doc, setDoc } = window.FB;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exams', 'main');
                    const newList = exams.map(e => e.id === updatedExam.id ? updatedExam : e);
                    await setDoc(docRef, { list: newList }, { merge: true });
                    setEditModalExam(null);
                    
                } catch (err) {
                    console.error("❌ Eroare la salvare:", err);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleAddAnnouncement = async () => {
                if (!newAnnouncement.title || !newAnnouncement.content || !user || !window.FB) return;
                
                try {
                    const { db, appId, collection, addDoc } = window.FB;
                    const announcementsRef = collection(db, 'artifacts', appId, 'public', 'data', 'announcements');
                    
                    const announcementData = {
                        ...newAnnouncement,
                        author: nickname || 'Anonim',
                        date: new Date().toISOString() 
                    };
                    
                    await addDoc(announcementsRef, announcementData);
                    
                    setShowNewAnnouncementModal(false);
                    setNewAnnouncement({ title: '', content: '', type: 'tema', subject: '', dueDate: '', attachedFiles: [], author: nickname || '' });
                } catch (err) {
                    console.error("❌ Eroare la adăugare anunț:", err);
                }
            };

            const handleEditAnnouncement = async (updatedAnnouncement) => {
                if (!user || !window.FB) return;
                
                try {
                    const { db, appId, doc, updateDoc } = window.FB;
                    const announcementRef = doc(db, 'artifacts', appId, 'public', 'data', 'announcements', updatedAnnouncement.id);
                    
                    await updateDoc(announcementRef, {
                        title: updatedAnnouncement.title,
                        content: updatedAnnouncement.content,
                        type: updatedAnnouncement.type,
                        subject: updatedAnnouncement.subject || '',
                        dueDate: updatedAnnouncement.dueDate || '',
                        author: updatedAnnouncement.author || '',
                        attachedFiles: updatedAnnouncement.attachedFiles || [],
                        fileData: updatedAnnouncement.fileData || null,
                        fileName: updatedAnnouncement.fileName || null,
                        lastEdited: new Date().toISOString()
                    });
                } catch (err) {
                    console.error("❌ Eroare la editare anunț:", err);
                }
            };

            const handleDeleteAnnouncement = async (id) => {
                if (!user || !window.FB || !window.confirm("Sigur dorești să ștergi acest anunț?")) return;
                
                try {
                    const { db, appId, doc, deleteDoc } = window.FB;
                    const announcementRef = doc(db, 'artifacts', appId, 'public', 'data', 'announcements', id);
                    
                    await deleteDoc(announcementRef);
                } catch (err) {
                    console.error("❌ Eroare la ștergere anunț:", err);
                }
            };

            const handleSaveNickname = () => {
                const name = tempNickname.trim();
                if (name) {
                    localStorage.setItem('ipa_nickname', name);
                    setNickname(name);
                    setShowNicknamePrompt(false);
                }
            };

            const handleSnoozeNickname = () => {
                localStorage.setItem('ipa_nickname_snooze', new Date().toISOString());
                setShowNicknamePrompt(false);
            };

            const getAccentColorHex = (type, accent) => {
                switch (type) {
                    case 'Curs': return accentColors[accent].primary;
                    case 'Laborator': return '#f43f5e'; 
                    case 'Seminar': return '#10b981'; 
                    case 'Proiect': return '#f97316'; 
                    case 'Sport': return '#a855f7'; 
                    default: return '#94a3b8'; 
                }
            };

            const getIcon = (type) => {
                switch (type) {
                    case 'Laborator': return '🧪';
                    case 'Curs': return '📖';
                    case 'Seminar': return '💬';
                    case 'Proiect': return '🛠';
                    case 'Sport': return '💪️';
                    default: return '📍';
                }
            };

            return (
                <div className={`min-h-screen flex flex-col transition-colors duration-300 ${darkMode ? 'bg-slate-950 text-slate-100 pattern-dark' : 'bg-slate-50 text-slate-900 pattern-light'}`}>
                    <header className={`${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} border-b sticky top-0 z-50 shadow-sm transition-colors duration-300`}>
                        <div className={`px-6 pt-10 pb-4 ${accentColors[accentColor].gradient} text-white transition-all duration-500`}>
                            <div className="max-w-2xl mx-auto flex items-start sm:items-center justify-between mb-4 gap-2">
                                <div className="flex items-start sm:items-center gap-3 sm:gap-4">
                                    <div className="bg-white/20 w-10 h-10 sm:w-11 sm:h-11 shrink-0 rounded-xl shadow-xl flex items-center justify-center text-white text-lg sm:text-xl backdrop-blur-sm transition-all duration-300">
                                        📅

                                                <span className={`status-dot ${isOnline ? 'bg-emerald-400' : 'bg-amber-400'}`}></span>

                                        </div>
                                        <div className="flex flex-col gap-1.5 mt-1 sm:mt-2">
                                            <div className="flex flex-wrap items-center gap-1.5 sm:gap-2">
                                                <span className="text-[8px] sm:text-[9px] font-black px-2 py-0.5 rounded-full border border-white/30 bg-white/20 uppercase backdrop-blur-sm whitespace-nowrap">

                                            <option key={key} value={key} className={darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}>{value.name}</option>

                                        style={view === tab.id ? { color: accentColors[accentColor].primary } : {}}
                                    >
                                        <span>{tab.icon}</span> {tab.label}
                                    </button>
                                ))}

                                                className={`flex-1 py-1.5 text-[10px] font-bold rounded-xl transition-all ${group === g ? 'bg-white shadow-sm' : 'text-white hover:bg-white/20'}`}
                                                style={group === g ? { color: accentColors[accentColor].primary } : {}}

                                    <div className="flex-1 bg-white/10 p-1 rounded-2xl flex backdrop-blur-sm">
                                        {['Toate', 'Impară', 'Pară'].map(w => (
                                            <button 
                                                key={w}

                                                className={`flex-1 py-1.5 text-[10px] font-bold rounded-xl transition-all ${week === w ? 'bg-white shadow-sm' : 'text-white hover:bg-white/20'}`}
                                                style={week === w ? { color: accentColors[accentColor].primary } : {}}
                                            >
                                                {w === 'Toate' ? 'Săpt.' : w}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {view === 'orar' && (
                            <nav className={`${darkMode ? 'bg-slate-950/50 border-slate-900' : 'bg-slate-50 border-slate-100'} px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar border-t transition-colors`}>
                                <div className="max-w-2xl mx-auto flex gap-2 w-full">
                                    {days.map(day => (
                                        <button 
                                            key={day} 
                                            onClick={() => setActiveDay(day)} 
                                            className={`px-6 py-2 rounded-xl text-xs font-bold transition-all shadow-sm border whitespace-nowrap card-hover ${activeDay === day ? 'bg-white border-transparent active-day-tab' : (darkMode ? 'text-slate-600 border-transparent hover:bg-slate-900' : 'text-slate-400 border-transparent hover:bg-white')}`}
                                            style={activeDay === day ? { color: accentColors[accentColor].primary } : {}}
                                        >
                                            {day}
                                        </button>
                                    ))}
                                </div>
                            </nav>
                        )}
                    </header>

                    <main className="max-w-2xl mx-auto w-full px-4 py-6 flex-1">
                        {isLoading && view === 'orar' && <LoadingSkeleton />}

                        {!isLoading && view === 'orar' && (
                            <div className="space-y-4 animate-fade" key={`${activeDay}-${group}-${week}`}>
                                {activeHoliday ? (
                                    <div className="py-24 text-center animate-fade">
                                        <div className="text-5xl mb-4 grayscale opacity-80">🌴</div>
                                        <h3 className="text-slate-500 font-bold tracking-[0.2em] uppercase text-xs mb-2">Zi Liberă Legală</h3>
                                        <div className={`inline-block px-4 py-2 rounded-full border ${darkMode ? 'bg-indigo-900/20 border-indigo-800/50 text-indigo-400' : 'bg-indigo-50 border-indigo-200 text-indigo-600'}`}>
                                            <p className="text-[10px] font-black uppercase tracking-widest">
                                                {activeHoliday}
                                            </p>
                                        </div>
                                    </div>
                                ) : currentSchedule.length > 0 ? currentSchedule.map((item, i) => {
                                    const active = isClassActive(item.start, item.end, item.day);
                                    return (
                                        <div 
                                            key={i} 
                                            ref={active ? activeCardRef : null}
                                            className={`${darkMode ? 'card-gradient-dark border-slate-800' : 'bg-white border-slate-100 card-gradient-light'} 
                                                rounded-[1.5rem] p-5 border shadow-sm relative overflow-hidden animate-pop transition-all duration-300 card-hover
                                                ${active ? (darkMode ? 'active-glow-dark z-10 scale-[1.02] border-2' : 'active-glow-light z-10 scale-[1.02] border-2') : ''}`}
                                        >
                                            <div className={`absolute top-0 left-0 bottom-0 w-1 ${active ? 'animate-pulse' : 'opacity-80'}`} style={{ backgroundColor: getAccentColorHex(item.type, accentColor) }}></div>
                                            
                                            <div className="flex flex-col sm:flex-row gap-4">
                                                <div className="sm:w-28 shrink-0">
                                                    <div className={`flex items-center gap-2 text-lg font-black italic tracking-tighter leading-none mb-1 ${active ? 'text-red-600' : ''}`}>
                                                        {item.start} - {item.end}
                                                    </div>
                                                    {active && (
                                                        <div className="flex items-center text-[8px] font-black text-red-600 uppercase tracking-widest mb-2">
                                                            <span className="live-pulse"></span> ACUM
                                                        </div>
                                                    )}
                                                    <div className="flex flex-wrap gap-1 mt-2">
                                                        <span className={`px-2 py-0.5 rounded text-[8px] font-black uppercase border tracking-tight ${darkMode ? 'bg-slate-900 text-slate-300 border-slate-700' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                                                            {getIcon(item.type)} {item.type}
                                                        </span>
                                                    </div>
                                                </div>

                                                <div className="flex-1">
                                                    <h3 className={`text-md font-extrabold leading-tight mb-3 italic uppercase tracking-tight ${active ? 'text-red-700 dark:text-red-500' : ''}`}>{item.subject}</h3>
                                                    
                                                    <div className="space-y-2">
                                                        <div className="flex items-center gap-3 text-[11px] font-semibold flex-wrap">
                                                            <span className={darkMode ? 'text-slate-400' : 'text-slate-500'}>{item.prof}</span>
                                                            {item.email && (
                                                                <a href={`mailto:${item.email}`} className={`px-2 py-1 rounded-full text-[9px] font-black border transition-all shadow-sm italic uppercase tracking-tight flex items-center gap-1 ${darkMode ? 'bg-blue-900/30 text-blue-400 border-blue-800/50 hover:bg-blue-600 hover:text-white' : 'bg-blue-50 text-blue-600 border-blue-100 hover:bg-blue-600 hover:text-white'}`}>
                                                                    📧 Contact
                                                                </a>
                                                            )}
                                                        </div>
                                                        <div className={`flex items-center gap-2 text-[10px] font-black uppercase tracking-tighter italic ${darkMode ? 'text-slate-400' : 'text-slate-700'}`}>
                                                            <span className="opacity-50">📍</span> {item.room}
                                                        </div>
                                                    </div>

                                                    {item.note && (
                                                        <div className={`mt-4 p-4 border-l-4 rounded-r-2xl text-[10px] font-bold leading-relaxed flex gap-3 items-start shadow-md ${darkMode ? 'bg-amber-900/20 border-amber-500 text-amber-200' : 'bg-amber-50 border-amber-400 text-amber-900'}`}>
                                                            <span className="text-lg">⚠️</span>
                                                            <div>
                                                                <div className={`uppercase tracking-widest text-[8px] mb-1 ${darkMode ? 'opacity-50 text-amber-400' : 'opacity-70'}`}>Observație importantă</div>
                                                                {item.note}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>

                                                {item.week !== 'Toate' && (
                                                    <div className={`sm:ml-auto self-start px-2 py-1 rounded-lg text-[8px] font-black uppercase tracking-widest italic shadow ${darkMode ? 'bg-slate-100 text-slate-900' : 'bg-slate-900 text-white'}`}>
                                                        📅 {item.week}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                }) : (
                                    <div className="py-24 text-center animate-fade">
                                        <div className="text-4xl mb-3 grayscale opacity-30">🏡</div>
                                        <h3 className="text-slate-400 font-bold tracking-[0.3em] uppercase text-[10px]">Zi Liberă</h3>
                                        {futureScheduleForDay.length > 0 && currentSemWeek < 8 && (
                                            <div className={`mt-3 inline-block px-3 py-1.5 rounded-full border ${darkMode ? 'bg-red-900/20 border-red-800/50 text-red-400' : 'bg-red-50 border-red-200 text-red-600'}`}>
                                                <p className="text-[9px] font-black uppercase tracking-widest">
                                                    ⏳ Ne revedem în Săpt. 8
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'examene' && (
                            <div className="space-y-4 animate-pop">
                                <div className="flex items-center justify-between px-1">
                                    <div className={`text-[10px] font-black uppercase tracking-widest ${darkMode ? 'text-slate-500' : 'text-slate-400'}`}>
                                        Planificare Sesiune iarna 2027
                                    </div>
                                    <button 
                                        onClick={() => isAdmin ? setIsAdmin(false) : setIsPinModalOpen(true)}
                                        className={`flex items-center gap-1.5 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-tighter border transition-all card-hover ${isAdmin ? 'bg-red-500 border-red-500 text-white shadow-lg shadow-red-500/20' : (darkMode ? 'bg-slate-900 border-slate-700 text-slate-400 hover:text-white' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50')}`}
                                    >
                                        {isAdmin ? '🔒 Blocare' : '🔓 Modifică'}
                                    </button>
                                </div>

                                {sortedExams.map((ex, i) => (
                                    <div key={i} className={`${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'} p-5 rounded-2xl border shadow-sm flex items-center justify-between group transition-all relative card-hover animate-slide`}>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className={`text-[8px] font-black px-1.5 py-0.5 rounded uppercase tracking-widest ${ex.type === 'Examen' ? (darkMode ? 'bg-rose-950 text-rose-400' : 'bg-rose-50 text-rose-600') : (darkMode ? 'bg-emerald-950 text-emerald-400' : 'bg-emerald-50 text-emerald-600')}`}>
                                                    {ex.type}
                                                </span>
                                                <span className={`text-[8px] font-black px-1.5 py-0.5 rounded uppercase tracking-widest ${darkMode ? 'bg-blue-950 text-blue-400' : 'bg-blue-50 text-blue-600'}`}>
                                                    {ex.credits} Credite
                                                </span>
                                            </div>
                                            <h3 className={`font-extrabold text-sm uppercase italic leading-tight ${darkMode ? 'text-white' : 'text-slate-900'}`}>{ex.subject}</h3>

                                                <div className={`text-[12px] font-bold mt-1 uppercase italic ${darkMode ? 'text-green-400' : 'text-green-600'}`}>

                                            <div className={`px-3 py-1.5 rounded-xl font-black text-[11px] uppercase tracking-tighter ${darkMode ? 'bg-slate-800 text-slate-500 border border-transparent' : 'bg-slate-50 text-slate-400 border border-transparent'} ${ex.date ? (darkMode ? 'bg-red-950/40 text-red-400 shadow-sm shadow-red-500/20 border-red-900/50' : 'bg-red-50 text-red-600 border-red-100') : ''}`}>
                                                {ex.date ? `${ex.date.toUpperCase()} ${ex.time ? ` • ORA ${ex.time}` : ''}` : 'În așteptare'}
                                            </div>
                                            {isAdmin && (
                                                <button 
                                                    onClick={() => setEditModalExam({ ...ex, time: ex.time || '08:00' })}
                                                    className="p-2 rounded-full bg-blue-500 text-white shadow-lg hover:scale-110 active:scale-95 transition-all"
                                                >
                                                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    </p>
                                </div>
                            </div>

                        {view === 'anunturi' && (
                            <div className="space-y-4 animate-pop">
                                <div className="flex items-center justify-between px-1">
                                    <div className={`text-[10px] font-black uppercase tracking-widest ${darkMode ? 'text-slate-500' : 'text-slate-400'}`}>
                                        Observații • Teme • Materiale
                                    </div>
                                    <button 
                                        onClick={() => {
                                            setNewAnnouncement({ 
                                                title: '', content: '', type: 'tema', subject: '', dueDate: '', attachedFiles: [], author: nickname || '' 
                                            });
                                            setShowNewAnnouncementModal(true);
                                        }}
                                        className="flex items-center gap-1.5 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-tighter border bg-blue-500 border-blue-500 text-white shadow-lg shadow-blue-500/20 card-hover"
                                    >
                                        ➕ Anunț nou
                                    </button>
                                </div>

                                {announcements.length === 0 ? (
                                    <div className="py-16 text-center">
                                        <div className="text-4xl mb-3">📢</div>
                                        <h3 className="text-slate-400 font-bold tracking-[0.2em] uppercase text-[10px]">Nu există anunțuri</h3>
                                        <p className="text-[9px] text-slate-500 mt-2">Adaugă primul anunț!</p>
                                    </div>
                                ) : (
                                    announcements.map((announcement) => (
                                        <AnnouncementCard 
                                            key={announcement.id} 
                                            announcement={announcement} 
                                            darkMode={darkMode}
                                            onEdit={handleEditAnnouncement}
                                            onDelete={handleDeleteAnnouncement}
                                        />
                                    ))
                                )}
                            </div>
                        )}

                        {view === 'links' && (
                            <div className="grid grid-cols-1 gap-3 animate-pop">
                                {usefulLinks.map((link, i) => (
                                    <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" className={`${darkMode ? 'bg-slate-900 hover:bg-slate-800 border-slate-800' : 'bg-white hover:bg-slate-50 border-slate-100'} p-5 rounded-2xl border shadow-sm flex items-center gap-5 transition-all group card-hover`}>
                                        <div className="text-3xl grayscale group-hover:grayscale-0 transition-all">{link.icon}</div>
                                        <div className="flex-1">
                                            <h3 className={`font-black text-sm uppercase italic ${darkMode ? 'text-white' : 'text-slate-900'}`}>{link.name}</h3>
                                            <p className="text-[10px] text-blue-500 font-medium">{link.desc}</p>
                                        </div>
                                        <div className="text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                        </div>
                                    </a>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* MODAL NICKNAME - PROMPT INIȚIAL */}
                    {showNicknamePrompt && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 modal-overlay animate-fade">
                            <div className={`w-full max-w-sm p-6 rounded-3xl shadow-2xl animate-pop ${darkMode ? 'bg-slate-900 border border-slate-800 text-white' : 'bg-white'}`}>
                                <h3 className={`text-sm font-black uppercase italic tracking-widest mb-2 text-center ${darkMode ? 'text-white' : 'text-slate-900'}`}>Numele tău</h3>
                                <p className={`text-[10px] text-center mb-6 ${darkMode ? 'text-slate-400' : 'text-slate-50'}`}>
                                    Alege un nickname pentru a vedea colegii cine postează anunțurile (opțional).
                                </p>
                                <input 
                                    type="text" 
                                    value={tempNickname} 
                                    onChange={(e) => setTempNickname(e.target.value)}
                                    placeholder="Ex: Alex, Anonim..."
                                    className={`w-full border-2 p-3 rounded-2xl text-center text-sm font-bold focus:outline-none transition-all ${darkMode ? 'border-slate-700 bg-slate-800 text-white placeholder-slate-500 focus:border-blue-500' : 'border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:border-blue-500'}`}
                                />
                                <div className="grid grid-cols-2 gap-3 mt-6">
                                    <button onClick={handleSnoozeNickname} className={`py-3 rounded-2xl text-xs font-bold uppercase transition-all hover:scale-105 ${darkMode ? 'bg-slate-800 text-slate-400 hover:bg-slate-700' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>Mai târziu</button>
                                    <button onClick={handleSaveNickname} className="bg-blue-600 text-white py-3 rounded-2xl text-xs font-black uppercase shadow-lg shadow-blue-500/20 hover:scale-105 transition-all">Salvează</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL PIN */}
                    {isPinModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay animate-fade">
                            <div className={`w-full max-w-xs p-6 rounded-3xl shadow-2xl animate-pop ${darkMode ? 'bg-slate-900 border border-slate-800' : 'bg-white'}`}>
                                <h3 className={`text-sm font-black uppercase italic tracking-widest mb-4 text-center ${darkMode ? 'text-white' : 'text-slate-900'}`}>Cod Acces</h3>
                                <input 
                                    id="pinInput"
                                    type="password" 
                                    value={pinInput} 
                                    onChange={(e) => setPinInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handlePinSubmit()}
                                    placeholder="----"
                                    className={`w-full border-2 p-3 rounded-2xl text-center text-xl font-bold tracking-[1em] focus:outline-none transition-all ${darkMode ? 'border-slate-700 bg-slate-800 text-white placeholder-slate-500 focus:border-blue-500' : 'border-slate-200 bg-white text-slate-900 placeholder-slate-300 focus:border-blue-500'}`}
                                />
                                <div className="grid grid-cols-2 gap-3 mt-6">
                                    <button onClick={() => setIsPinModalOpen(false)} className={`py-3 rounded-2xl text-xs font-bold uppercase transition-all hover:scale-105 ${darkMode ? 'bg-slate-800 text-slate-400 hover:bg-slate-700' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>Anulează</button>
                                    <button onClick={handlePinSubmit} className="bg-blue-600 text-white py-3 rounded-2xl text-xs font-black uppercase shadow-lg shadow-blue-500/20 hover:scale-105 transition-all">Acces</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL EDITARE EXAMEN */}
                    {editModalExam && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay animate-fade">
                            <div className={`w-full max-w-sm p-6 rounded-3xl shadow-2xl animate-pop ${darkMode ? 'bg-slate-900 border border-slate-800 text-white' : 'bg-white'}`}>
                                <h3 className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Editare Detalii</h3>
                                <h2 className={`text-sm font-black uppercase italic tracking-tight mb-6 leading-tight ${darkMode ? 'text-white' : 'text-slate-900'}`}>{editModalExam.subject}</h2>
                                
                                <div className="space-y-4 text-left">
                                    <div>
                                        <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Data (Ex: 15 Iunie)</label>
                                        <input 
                                            type="text" 
                                            value={editModalExam.date} 
                                            onChange={(e) => setEditModalExam({...editModalExam, date: e.target.value})}
                                            className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white' : 'border-slate-200 bg-white text-slate-900'}`}
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Ora (Format 00:00)</label>
                                            <input 
                                                type="text" 
                                                value={editModalExam.time} 
                                                placeholder="00:00"
                                                maxLength="5"
                                                onChange={(e) => setEditModalExam({...editModalExam, time: formatTimeInput(e.target.value)})}
                                                className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white placeholder-slate-400' : 'border-slate-200 bg-white text-slate-900 placeholder-slate-400'}`}
                                            />
                                        </div>
                                        <div>
                                            <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Sala</label>
                                            <input 
                                                type="text" 
                                                value={editModalExam.room} 
                                                placeholder="L120"
                                                onChange={(e) => setEditModalExam({...editModalExam, room: e.target.value})}
                                                className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white placeholder-slate-400' : 'border-slate-200 bg-white text-slate-900 placeholder-slate-400'}`}
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3 mt-8">
                                    <button 
                                        disabled={isSaving}
                                        onClick={() => setEditModalExam(null)} 
                                        className={`py-3 rounded-2xl text-xs font-bold uppercase transition-all hover:scale-105 ${darkMode ? 'bg-slate-800 text-slate-400' : 'bg-slate-100 text-slate-500'} ${isSaving ? 'opacity-50' : ''}`}
                                    >
                                        Renunță
                                    </button>
                                    <button 
                                        disabled={isSaving || !isOnline}
                                        onClick={() => handleSaveExam(editModalExam)} 
                                        className={`bg-emerald-600 text-white py-3 rounded-2xl text-xs font-black uppercase shadow-lg shadow-emerald-500/20 transition-all ${isSaving || !isOnline ? 'opacity-70 scale-95 cursor-not-allowed' : 'hover:scale-105 active:scale-95'}`}
                                    >
                                        {isSaving ? 'Se salvează...' : 'Salvează'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL ANUNȚ NOU */}
                    {showNewAnnouncementModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay animate-fade">
                            <div className={`w-full max-w-sm p-6 rounded-3xl shadow-2xl animate-pop ${darkMode ? 'bg-slate-900 border border-slate-800 text-white' : 'bg-white'}`}>
                                <h3 className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Anunț Nou</h3>
                                
                                <div className="space-y-4 mt-4">
                                    <div>
                                        <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Tip anunț</label>
                                        <select
                                            value={newAnnouncement.type}
                                            onChange={(e) => setNewAnnouncement({...newAnnouncement, type: e.target.value})}
                                            className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white' : 'border-slate-200 bg-white text-slate-900'}`}
                                        >
                                            <option value="test" className={darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}>📝 Test</option>
                                            <option value="tema" className={darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}>📋 Temă</option>
                                            <option value="observatie" className={darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}>💡 Observație</option>
                                            <option value="materiale" className={darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}>📁 Materiale / Referate</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Titlu (obligatoriu)</label>
                                        <input 
                                            type="text" 
                                            value={newAnnouncement.title} 
                                            onChange={(e) => setNewAnnouncement({...newAnnouncement, title: e.target.value})}
                                            className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white' : 'border-slate-200 bg-white text-slate-900'}`}
                                        />
                                    </div>
                                    <div>
                                        <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Materia (opțional)</label>
                                        <select
                                            value={newAnnouncement.subject || ''}
                                            onChange={(e) => setNewAnnouncement({...newAnnouncement, subject: e.target.value})}
                                            className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white' : 'border-slate-200 bg-white text-slate-900'}`}
                                        >
                                            <option value="" className={darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}>Fără materie specifică</option>
                                            {subjectsList.map(subj => (
                                                <option key={subj} value={subj} className={darkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-900'}>{subj}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Conținut (obligatoriu)</label>
                                        <textarea 
                                            rows="3"
                                            value={newAnnouncement.content} 
                                            onChange={(e) => setNewAnnouncement({...newAnnouncement, content: e.target.value})}
                                            className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none resize-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white' : 'border-slate-200 bg-white text-slate-900'}`}
                                        />
                                    </div>
                                    <div>
                                        <label className={`text-[9px] font-black uppercase tracking-widest opacity-40 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Data limită (opțional)</label>
                                        <input 
                                            type="text" 
                                            value={newAnnouncement.dueDate} 
                                            onChange={(e) => setNewAnnouncement({...newAnnouncement, dueDate: e.target.value})}
                                            placeholder="ex: 25 Mai 2026"
                                            className={`w-full border-2 p-3 rounded-xl text-xs font-bold focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white placeholder-slate-400' : 'border-slate-200 bg-white text-slate-900 placeholder-slate-400'}`}
                                        />
                                    </div>

                                    <div>
                                        <label className={`text-[9px] font-black uppercase tracking-widest opacity-60 ml-1 ${darkMode ? 'text-white' : 'text-slate-900'}`}>Încarcă Materiale (Poți selecta mai multe - Max 25MB)</label>
                                        <input 
                                            type="file" 
                                            multiple
                                            accept="application/pdf,image/*"
                                            onChange={async (e) => {
                                                const files = Array.from(e.target.files);
                                                if (!files.length) return;

                                                const processedFiles = [];

                                                for (let file of files) {
                                                    if (file.type === 'application/pdf') {
                                                        if (file.size > 25 * 1024 * 1024) {
                                                            alert(`Atenție: PDF-ul ${file.name} are peste 25MB. Acesta nu va fi comprimat automat.`);
                                                        }
                                                        const reader = new FileReader();
                                                        const base64 = await new Promise(resolve => {
                                                            reader.onloadend = () => resolve(reader.result);
                                                            reader.readAsDataURL(file);
                                                        });
                                                        processedFiles.push({ name: file.name, data: base64 });
                                                    } else if (file.type.startsWith('image/')) {
                                                        const reader = new FileReader();
                                                        const base64 = await new Promise(resolve => {
                                                            reader.onload = (event) => {
                                                                const img = new Image();
                                                                img.onload = () => {
                                                                    const canvas = document.createElement('canvas');
                                                                    let width = img.width;
                                                                    let height = img.height;

                                                                    const MAX_WIDTH = 2000;
                                                                    const MAX_HEIGHT = 2000;

                                                                    if (width > height) {
                                                                        if (width > MAX_WIDTH) {
                                                                            height *= MAX_WIDTH / width;
                                                                            width = MAX_WIDTH;
                                                                        }
                                                                    } else {
                                                                        if (height > MAX_HEIGHT) {
                                                                            width *= MAX_HEIGHT / height;
                                                                            height = MAX_HEIGHT;
                                                                        }
                                                                    }

                                                                    canvas.width = width;
                                                                    canvas.height = height;
                                                                    const ctx = canvas.getContext('2d');
                                                                    ctx.drawImage(img, 0, 0, width, height);
                                                                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                                                                };
                                                                img.src = event.target.result;
                                                            };
                                                            reader.readAsDataURL(file);
                                                        });
                                                        processedFiles.push({ name: file.name.split('.')[0] + '.jpg', data: base64 });
                                                    }
                                                }

                                                setNewAnnouncement(prev => ({
                                                    ...prev, 
                                                    attachedFiles: [...(prev.attachedFiles || []), ...processedFiles]
                                                }));
                                                
                                                e.target.value = "";
                                            }}
                                            className={`w-full border-2 p-2 rounded-xl text-[10px] focus:outline-none ${darkMode ? 'border-slate-700 bg-slate-800 text-white' : 'border-slate-200 bg-white text-slate-900'}`}
                                        />
                                        {newAnnouncement.attachedFiles && newAnnouncement.attachedFiles.length > 0 && (
                                            <div className="mt-2 space-y-1">
                                                {newAnnouncement.attachedFiles.map((f, idx) => (
                                                    <p key={idx} className={`text-[8px] font-bold text-emerald-500 ml-1 flex justify-between items-center p-1.5 rounded ${darkMode ? 'bg-emerald-900/30' : 'bg-emerald-50'}`}>
                                                        <span>✅ {f.name.substring(0, 25)}{f.name.length > 25 ? '...' : ''}</span>
                                                        <span 
                                                            className="text-red-500 cursor-pointer px-2 text-xs hover:scale-125 transition-all" 
                                                            onClick={() => setNewAnnouncement(prev => ({...prev, attachedFiles: prev.attachedFiles.filter((_, i) => i !== idx)}))}
                                                        >
                                                            ❌
                                                        </span>
                                                    </p>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3 mt-8">
                                    <button 
                                        onClick={() => setShowNewAnnouncementModal(false)} 
                                        className={`py-3 rounded-2xl text-xs font-bold uppercase transition-all hover:scale-105 ${darkMode ? 'bg-slate-800 text-slate-400' : 'bg-slate-100 text-slate-500'}`}
                                    >
                                        Renunță
                                    </button>
                                    <button 
                                        onClick={handleAddAnnouncement} 
                                        className="bg-emerald-600 text-white py-3 rounded-2xl text-xs font-black uppercase shadow-lg shadow-emerald-500/20 hover:scale-105 transition-all"
                                    >
                                        Adaugă
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className={`py-8 text-center px-8 border-t ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`}>
                        <p className={`text-[9px] font-black uppercase tracking-[0.4em] italic leading-loose ${darkMode ? 'text-slate-600' : 'text-slate-300'}`}>Ingineria Produselor Alimentare • Final.2026 • UPB</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
